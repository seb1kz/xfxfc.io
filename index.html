<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zapkienakasebastian</title>
  <link rel="shortcut icon" href="favi.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box; margin: 0; padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: url('Tlo.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      position: relative;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,10,10,0.45) 0%,
        rgba(10,10,10,0.3) 50%,
        rgba(10,10,10,0.75) 100%
      );
      z-index: 0;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 10;
    }

    .spotify-section {
      margin-top: 48px;
      width: 100%;
      max-width: 420px;
      mx: auto;
    }

    .spotify-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 14px;
      justify-content: center;
    }

    .spotify-label i {
      color: #1DB954;
      font-size: 14px;
    }

    .spotify-embed-wrapper {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.07);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .spotify-embed-wrapper:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 50px rgba(0,0,0,0.65);
    }

    .spotify-embed-wrapper iframe {
      display: block;
      border: none;
      border-radius: 16px;
    }

    .social-link {
      transition: color 0.3s, transform 0.2s;
      display: inline-block;
    }
    .social-link:hover {
      transform: translateY(-3px);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  </style>
</head>
<body class="text-zinc-200">

  <div class="overlay"></div>

  <div class="content flex flex-col items-center justify-start min-h-screen py-20 px-6">

    <div class="text-center max-w-md w-full">
      <img src="cat.jpg"
           alt="seb"
           class="w-40 h-40 mx-auto rounded-3xl object-cover border-4 border-zinc-800 shadow-2xl mb-10">

      <h1 class="text-7xl font-light tracking-tighter mb-2">xfxfc</h1>
      <p class="text-zinc-400 text-xl mb-1">Welcome!</p>
      <p class="text-zinc-500 text-lg leading-relaxed max-w-xs mx-auto">
        maybe someday I will become a programmer
      </p>

      <div class="flex justify-center gap-10 mt-16 text-4xl">
        <a href="https://www.youtube.com/@xfxfc/featured" target="_blank"
           class="social-link hover:text-red-500">
          <i class="fab fa-youtube"></i>
        </a>
        <a href="https://github.com/lewy3" target="_blank"
           class="social-link hover:text-white">
          <i class="fab fa-github"></i>
        </a>
        <a href="https://open.spotify.com/user/31v6vltmxpdibbqtckfwrj5ornuu?si=2655e6d5ea9446ce" target="_blank"
           class="social-link hover:text-green-500">
          <i class="fab fa-spotify"></i>
        </a>
      </div>

      <div class="spotify-section mx-auto">
        <div class="spotify-label">
          <i class="fab fa-spotify"></i>
          <span>my playlist</span>
        </div>
        <div class="spotify-embed-wrapper">
          <iframe
            src="https://open.spotify.com/embed/playlist/5svxLueXgP1VzEsdyAdNAf?utm_source=generator"
            width="100%"
            height="380"
            allowfullscreen
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy">
          </iframe>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
